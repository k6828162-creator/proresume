<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Registration - Resume Website</title>

<style>
body{
    font-family: Arial;
    background: #f4f4f4;
    text-align:center;
}

.container{
    background:white;
    width:300px;
    margin:80px auto;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px gray;
}

input{
    width:90%;
    padding:10px;
    margin:8px 0;
}

button{
    width:95%;
    padding:10px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:5px;
}

button:hover{
    background:#0056b3;
}

a{
    text-decoration:none;
}
</style>

</head>

<body>

<div class="container">

<h2>Register</h2>

<form>

<input type="text" placeholder="Full Name" required>

<input type="email" placeholder="Email" required>

<input type="text" placeholder="Username" required>

<input type="password" placeholder="Password" required>

<button type="submit">Register</button>

<p>Already have account? <a href="login.html">Login</a></p>

</form>

</div>

</body>
</html>
